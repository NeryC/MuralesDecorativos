name: Keep Supabase Alive

on:
  schedule:
    # Cada 5 días a las 10:00 UTC (Supabase pausa tras 7 días sin actividad)
    - cron: '0 10 */5 * *'
  workflow_dispatch: # Permite correrlo manualmente desde GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase via app
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.PRODUCTION_URL }}/api/ping")
          echo "Response status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Ping failed with status $STATUS"
            exit 1
          fi
          echo "Supabase is alive ✓"
